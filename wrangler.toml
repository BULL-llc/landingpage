# Cloudflare Pages build configuration.
#
# 配信物は `packages/frontend` の静的サイト。Cloudflare Pages の Git 連携
# （ダッシュボードで GitHub リポジトリを接続）で、main への push ごとに
# Cloudflare 側がビルド・デプロイする。GitHub Actions のデプロイ workflow は
# 使わない。
#
# 重要: ビルドコマンドは wrangler.toml では指定できない。Cloudflare Pages の
# ダッシュボード（Settings → Builds & deployments → Build configuration）の
# 「Build command」欄に `bun run --filter frontend build` を設定する。ここが
# 空のままだと Cloudflare は「No build command specified. Skipping build step.」
# としてビルドを飛ばし、`packages/frontend/dist` が生成されず
# 「Output directory not found」でデプロイが失敗する（過去の失敗原因）。
#
# `name` は Cloudflare Pages のプロジェクト名と完全一致させる。Git 連携の
# プロジェクトは `landingpage` で作成済みのため、この値も `landingpage`。
# フォークや別環境ではこの 1 行を自分のプロジェクト名に置き換える。
#
# `pages_build_output_dir` はリポジトリ相対の公開ディレクトリで、全環境で共通。
# ビルドコマンドが生成する出力先と一致させる。
#
# `compatibility_date` は意図的に省略する。Pages Functions 専用の項目であり、
# この静的サイトでは使わない。
name = "landingpage"
pages_build_output_dir = "packages/frontend/dist"
